<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Instagram Story — Настя</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Great+Vibes&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#111; display:flex; justify-content:center; padding:20px; font-family:'Inter',sans-serif; }
  .phone {
    width: 420px;
    background: #000;
    border-radius: 40px;
    padding: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  .screen {
    border-radius: 30px;
    overflow: hidden;
    position: relative;
    background: #000;
  }
  /* Header — fake IG top */
  .ig-header {
    position: absolute; top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 14px 16px 8px;
    background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
  }
  .story-bars {
    display: flex; gap: 3px;
    margin-bottom: 10px;
  }
  .story-bar {
    flex: 1; height: 2px;
    background: rgba(255,255,255,0.3);
    border-radius: 1px;
  }
  .story-bar.active { background: rgba(255,255,255,0.9); }
  .ig-user {
    display: flex; align-items: center; gap: 8px;
  }
  .ig-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #fff;
  }
  .ig-name {
    font-size: 13px; font-weight: 600; color: #fff;
  }
  .ig-time {
    font-size: 11px; color: rgba(255,255,255,0.6);
    margin-left: 6px;
  }
  /* Main photo */
  .main-photo {
    width: 100%;
    aspect-ratio: 9/16;
    object-fit: cover;
    object-position: center 20%;
    display: block;
  }
  /* Overlays */
  .overlay-gradient {
    position: absolute; top:0;left:0;right:0;bottom:0;
    background: linear-gradient(180deg,
      transparent 0%,
      transparent 35%,
      rgba(0,0,0,0.7) 65%,
      rgba(0,0,0,0.9) 100%
    );
  }
  .content-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 20px 20px 30px;
    z-index: 5;
  }
  .sticker-hbd {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 12px 20px;
    margin-bottom: 14px;
  }
  .sticker-hbd .hbd-title {
    font-family: 'Great Vibes', cursive;
    font-size: 32px;
    color: #fff;
    line-height: 1.1;
  }
  .sticker-hbd .hbd-name {
    font-weight: 900;
    font-size: 20px;
    color: #fff;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .message-text {
    font-size: 14px;
    color: rgba(255,255,255,0.9);
    line-height: 1.6;
    margin-bottom: 12px;
  }
  /* Photo strip */
  .mini-photos {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .mini-photos img {
    width: 60px; height: 60px;
    border-radius: 8px;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.3);
  }
  .tag-text {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
  }
  .tag-text span { color: rgba(255,255,255,0.8); }
  /* Bottom IG input */
  .ig-bottom {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 8px 16px;
    display: flex; align-items: center; gap: 10px;
    z-index: 10;
  }
  .ig-input {
    flex: 1;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    background: transparent;
  }
  .ig-send {
    font-size: 18px;
    color: rgba(255,255,255,0.5);
  }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:12px;left:12px;z-index:9999;background:rgba(0,0,0,0.7);color:#fff;text-decoration:none;padding:8px 16px;border-radius:8px;font-family:sans-serif;font-size:13px;backdrop-filter:blur(10px);transition:background 0.2s;" onmouseover="this.style.background='rgba(0,0,0,0.9)'" onmouseout="this.style.background='rgba(0,0,0,0.7)'">&#8592; Все варианты</a>
<div class="phone">
  <div class="screen">
    <img src="photos/photo2.jpg" class="main-photo" alt="">

    <!-- IG header -->
    <div class="ig-header">
      <div class="story-bars">
        <div class="story-bar active"></div>
        <div class="story-bar active"></div>
        <div class="story-bar active"></div>
        <div class="story-bar"></div>
        <div class="story-bar"></div>
      </div>
      <div class="ig-user">
        <img src="photos/photo6.jpg" class="ig-avatar" alt="" style="object-position:center top;">
        <span class="ig-name">sonya_bff</span>
        <span class="ig-time">3 ч.</span>
      </div>
    </div>

    <div class="overlay-gradient"></div>

    <div class="content-overlay">
      <div class="sticker-hbd">
        <div class="hbd-title">Happy Birthday,</div>
        <div class="hbd-name">Настя!</div>
      </div>

      <div class="message-text">
        Ты делаешь мой мир теплее и уютнее. Спасибо за каждую улыбку, за поддержку в нужный момент, за веру в меня. Ты самый важный человек в моей жизни.
      </div>

      <div class="mini-photos">
        <img src="photos/photo1.jpg" alt="" style="object-position:center 20%;">
        <img src="photos/photo4.jpg" alt="" style="object-position:center 15%;">
        <img src="photos/photo5.jpg" alt="" style="object-position:center 25%;">
        <img src="photos/photo3.jpg" alt="" style="object-position:center 18%;">
      </div>

      <div class="tag-text">
        <span>@nastya_bday</span> &#10084; люблю тебя всей душой
      </div>
    </div>

  </div>
</div>

</body>
</html>
